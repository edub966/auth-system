<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auth System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f4f4f5; display: flex; justify-content: center; padding: 40px 16px; }
    .container { width: 100%; max-width: 420px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; color: #111; }
    .card { background: white; border-radius: 10px; padding: 24px; margin-bottom: 16px; border: 1px solid #e4e4e7; }
    .card h2 { font-size: 14px; font-weight: 600; color: #444; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
    input { width: 100%; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; margin-bottom: 10px; outline: none; }
    input:focus { border-color: #6366f1; }
    button { width: 100%; padding: 9px; border-radius: 6px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-secondary { background: #f4f4f5; color: #333; border: 1px solid #e4e4e7; margin-top: 8px; }
    .btn-danger { background: #ef4444; color: white; margin-top: 8px; }
    .message { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: 6px; display: none; }
    .message.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; display: block; }
    .message.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block; }
    .protected { display: none; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; margin-right: 6px; }
    .status-dot.active { background: #22c55e; }
    .status-bar { font-size: 13px; color: #666; display: flex; align-items: center; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Auth System</h1>

  <div class="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Not logged in</span>
  </div>

  <!-- Register -->
  <div class="card" id="register-card">
    <h2>Register</h2>
    <input type="email" id="reg-email" placeholder="Email">
    <input type="password" id="reg-password" placeholder="Password">
    <button class="btn-primary" onclick="register()">Create account</button>
    <div class="message" id="reg-msg"></div>
  </div>

  <!-- Login -->
  <div class="card" id="login-card">
    <h2>Login</h2>
    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-password" placeholder="Password">
    <button class="btn-primary" onclick="login()">Login</button>
    <div class="message" id="login-msg"></div>
  </div>

  <!-- Protected content -->
  <div class="card protected" id="protected-card">
    <h2>Protected Dashboard</h2>
    <p id="dashboard-msg" style="font-size:14px;color:#444;margin-bottom:12px;"></p>
    <button class="btn-secondary" onclick="getDashboard()">Refresh dashboard</button>
    <button class="btn-secondary" onclick="getAdminUsers()">Try admin route</button>
    <button class="btn-danger" onclick="logout()">Logout</button>
    <div class="message" id="protected-msg"></div>
  </div>
</div>

<script>
  // Access token lives in memory only — never localStorage
  let accessToken = null;

  function showMessage(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = "message " + type;
  }

  function setLoggedIn(email, role) {
    accessToken !== null;
    document.getElementById("status-dot").classList.add("active");
    document.getElementById("status-text").textContent = `Logged in as ${email} (${role})`;
    document.getElementById("register-card").style.display = "none";
    document.getElementById("login-card").style.display = "none";
    document.getElementById("protected-card").style.display = "block";
  }

  function setLoggedOut() {
    accessToken = null;
    document.getElementById("status-dot").classList.remove("active");
    document.getElementById("status-text").textContent = "Not logged in";
    document.getElementById("register-card").style.display = "block";
    document.getElementById("login-card").style.display = "block";
    document.getElementById("protected-card").style.display = "none";
  }

  async function register() {
    const email = document.getElementById("reg-email").value;
    const password = document.getElementById("reg-password").value;
    const res = await fetch("/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    showMessage("reg-msg", data.message || data.error, res.ok ? "success" : "error");
  }

  async function login() {
    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;
    const res = await fetch("/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (res.ok) {
      accessToken = data.access_token;
      setLoggedIn(email, data.role);
    } else {
      showMessage("login-msg", data.error, "error");
    }
  }

  async function getDashboard() {
    const res = await fetch("/api/dashboard", {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const data = await res.json();
    if (res.ok) {
      document.getElementById("dashboard-msg").textContent = data.message;
      showMessage("protected-msg", "Dashboard loaded successfully", "success");
    } else {
      showMessage("protected-msg", data.msg || data.error, "error");
    }
  }

  async function getAdminUsers() {
    const res = await fetch("/api/admin/users", {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const data = await res.json();
    showMessage("protected-msg", res.ok ? JSON.stringify(data) : (data.error || data.msg), res.ok ? "success" : "error");
  }

  async function logout() {
    await fetch("/auth/logout", {
      method: "DELETE",
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    setLoggedOut();
  }
</script>
</body>
</html>
